<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>The Hollow Tide — Lore Codex</title>
<style>
:root{
  --bg:#0b1520; --bg2:#0f1e2d; --panel:#122335; --line:#1e3a52;
  --text:#d8e6f0; --dim:#8aa5b8; --head:#f0f7fc;
  --sea:#4fd1c5; --sand:#e8c47c; --coral:#ff7d6b; --leaf:#7ad48f;
  --shadow:0 8px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:radial-gradient(1200px 700px at 80% -10%, #14293d 0%, var(--bg) 55%);color:var(--text);
  font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
a{color:var(--sea);text-decoration:none}
a:hover{text-decoration:underline}
code{background:#0a2233;border:1px solid var(--line);padding:.05em .4em;border-radius:5px;font-size:.9em;color:var(--sand)}
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gatecard{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
  padding:40px 36px;max-width:430px;width:100%;text-align:center}
.gatecard h1{margin:.2em 0 .1em;font-size:1.5rem;color:var(--head);letter-spacing:.04em}
.gatecard .wave{font-size:2.2rem}
.gatecard p{color:var(--dim);font-size:.95rem;margin:.4em 0 1.4em}
.gatecard input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
  background:var(--bg2);color:var(--text);font-size:1rem;text-align:center;letter-spacing:.06em}
.gatecard input:focus{outline:2px solid var(--sea);border-color:transparent}
.gatecard button{margin-top:14px;width:100%;padding:12px;border:0;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,#2b8f86,#4fd1c5);color:#05201d;font-weight:700;font-size:1rem}
.gatecard .err{color:var(--coral);font-size:.9rem;min-height:1.3em;margin-top:10px}
.gatecard .foot{margin-top:18px;font-size:.78rem;color:#5d7688}
#app{display:none}
header.top{position:sticky;top:0;z-index:50;background:rgba(11,21,32,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line)}
.topin{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 18px;flex-wrap:wrap}
.brand{font-weight:800;color:var(--head);letter-spacing:.03em;white-space:nowrap}
.brand .tide{color:var(--sea)}
.books{display:flex;gap:6px;flex-wrap:wrap}
.bookbtn{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:transparent;
  color:var(--dim);cursor:pointer;font-size:.9rem;font-weight:600}
.bookbtn.on{background:var(--sea);border-color:var(--sea);color:#05201d}
#search{margin-left:auto;flex:1;min-width:140px;max-width:300px;padding:8px 12px;border-radius:999px;
  border:1px solid var(--line);background:var(--bg2);color:var(--text);font-size:.9rem}
#search:focus{outline:2px solid var(--sea)}
#gear{border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:999px;
  width:36px;height:36px;cursor:pointer;font-size:1rem}
#gear:hover{color:var(--sea);border-color:var(--sea)}
#gear.live{color:#05201d;background:var(--leaf);border-color:var(--leaf)}
.wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:290px minmax(0,1fr);gap:0}
nav#toc{position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;padding:18px 8px 40px 18px;
  border-right:1px solid var(--line);font-size:.86rem}
nav#toc a{display:block;color:var(--dim);padding:3px 8px;border-radius:6px;border-left:2px solid transparent}
nav#toc a.l3{padding-left:22px;font-size:.82rem}
nav#toc a:hover{color:var(--text);background:var(--bg2);text-decoration:none}
nav#toc a.cur{color:var(--sea);border-left-color:var(--sea);background:var(--bg2)}
main{padding:30px 42px 120px;min-width:0}
.updated{color:var(--dim);font-size:.82rem;border:1px solid var(--line);border-radius:8px;
  padding:8px 12px;background:var(--bg2);margin-bottom:22px}
main h1{font-size:2.2rem;color:var(--head);letter-spacing:.02em;margin:.4em 0 .2em}
main h2{font-size:1.5rem;color:var(--head);margin:2.2em 0 .6em;padding-top:.6em;border-top:1px solid var(--line)}
main h3{font-size:1.15rem;color:var(--sea);margin:1.8em 0 .5em}
main h4{font-size:1rem;color:var(--sand)}
main p{margin:.7em 0}
main hr{border:0;border-top:1px dashed var(--line);margin:2em 0}
blockquote{margin:1em 0;padding:10px 18px;border-left:3px solid var(--sand);background:var(--bg2);
  border-radius:0 10px 10px 0;color:#e6d9b8;font-style:italic}
.tscroll{overflow-x:auto;margin:1em 0;border:1px solid var(--line);border-radius:10px}
table{border-collapse:collapse;width:100%;font-size:.9rem}
th{background:#16334b;color:var(--head);text-align:left;padding:9px 12px;white-space:nowrap}
td{padding:8px 12px;border-top:1px solid var(--line);vertical-align:top}
tbody tr:nth-child(odd){background:rgba(255,255,255,.02)}
ul,ol{padding-left:1.5em}
li{margin:.35em 0}
.tag{display:inline-block;font-size:.68rem;font-weight:800;letter-spacing:.06em;padding:1px 8px;
  border-radius:999px;vertical-align:.12em;margin:0 2px}
.tag-p{background:#123b2a;color:#7ad48f;border:1px solid #1e5c41}
.tag-e{background:#3b3012;color:#e8c47c;border:1px solid #5c4c1e}
.tag-d{background:#3b1512;color:#ff8d7d;border:1px solid #5c241e}
.flag{color:var(--sea);font-weight:700;cursor:help}
a.xref{color:var(--sand);border-bottom:1px dotted var(--sand)}
a.xref:hover{text-decoration:none;border-bottom-style:solid}
#results{display:none;max-width:760px;margin:0 auto;padding:30px 42px 120px}
.res{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin:10px 0;cursor:pointer}
.res:hover{border-color:var(--sea)}
.res .path{font-size:.78rem;color:var(--dim)}
.res .snip{font-size:.9rem;margin-top:4px}
.res .snip mark{background:#e8c47c;color:#1a1a0a;border-radius:3px;padding:0 2px}
#topbtn{position:fixed;right:22px;bottom:22px;z-index:40;background:var(--panel);border:1px solid var(--line);
  color:var(--dim);border-radius:999px;width:44px;height:44px;cursor:pointer;font-size:1.1rem;display:none}
#topbtn:hover{color:var(--sea);border-color:var(--sea)}
/* dashboard */
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin:18px 0}
.pcard h2{border-top:0;margin:.2em 0 .1em;padding-top:0}
.pmeta{color:var(--dim);font-size:.85rem;margin-bottom:10px}
.pmeta b{color:var(--sand)}
.qty{white-space:nowrap}
.qbtn{border:1px solid var(--line);background:var(--bg2);color:var(--text);border-radius:6px;
  min-width:26px;height:26px;cursor:pointer;font-size:.9rem;vertical-align:middle}
.qbtn:hover{border-color:var(--sea);color:var(--sea)}
.qbtn.del:hover{border-color:var(--coral);color:var(--coral)}
.addrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.addrow input{padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--text)}
.addrow .additem{flex:1;min-width:180px}
.addrow .addqty{width:70px}
.addrow button{border:1px solid var(--sea);background:transparent;color:var(--sea);border-radius:8px;
  padding:7px 14px;cursor:pointer;font-weight:600}
.addrow button:hover{background:var(--sea);color:#05201d}
.dim{color:var(--dim)}
.effsum{font-size:.8rem;color:var(--leaf);white-space:nowrap}
.newdef{margin:10px 0 20px}
@media (max-width: 900px){
  .wrap{grid-template-columns:1fr}
  nav#toc{position:static;height:auto;max-height:260px;border-right:0;border-bottom:1px solid var(--line)}
  main{padding:22px 18px 90px}
}
</style>
</head>
<body>
<div id="gate">
  <div class="gatecard">
    <div class="wave">🌊</div>
    <h1>THE HOLLOW TIDE</h1>
    <p>Lore Codex — two islands, one wound.<br>Dev access only.</p>
    <input id="pw" type="password" placeholder="passcode" autocomplete="off">
    <button id="unlock">Enter the tide</button>
    <div class="err" id="err"></div>
    <div class="foot">The sea remembers what you leave behind.</div>
  </div>
</div>
<div id="app">
  <header class="top">
    <div class="topin">
      <span class="brand">🌊 THE <span class="tide">HOLLOW TIDE</span> · CODEX</span>
      <div class="books">
        <button class="bookbtn on" data-book="ml">Motu Lani</button>
        <button class="bookbtn" data-book="tp">Te Motu Pūrākau</button>
        <button class="bookbtn" data-book="pe">Personals</button>
        <button class="bookbtn" data-book="pl">Players</button>
        <button class="bookbtn" data-book="it">Items</button>
      </div>
      <input id="search" type="search" placeholder="Search…  (3+ letters)">
      <button id="gear" title="Configure bot API for live editing">⚙</button>
    </div>
  </header>
  <div id="results"></div>
  <div class="wrap">
    <nav id="toc"></nav>
    <main>
      <div class="updated" id="updated"></div>
      <div id="content"></div>
    </main>
  </div>
  <button id="topbtn" title="Back to top">↑</button>
</div>

let DATA = null, curTab = 'ml', liveOK = false;

function b64buf(s){const b=atob(s);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a.buffer;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function jslug(s){return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-');}
function money(n){return (n||0).toLocaleString('en-US');}

async function tryUnlock(){
  const pw = document.getElementById('pw').value.replace(/\s+/g,'').toLowerCase();
  const err = document.getElementById('err');
  err.textContent = '';
  if(!pw){err.textContent='Enter the passcode.';return;}
  try{
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64buf(ENC.salt), iterations:ENC.iter, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64buf(ENC.iv)}, key, b64buf(ENC.ct));
    DATA = JSON.parse(new TextDecoder().decode(pt));
    sessionStorage.setItem('tidepw', pw);
    boot();
  }catch(e){
    err.textContent = 'The tide does not answer. Check the passcode.';
  }
}

function boot(){
  document.getElementById('gate').style.display='none';
  const app=document.getElementById('app');
  app.style.display='block';
  document.getElementById('updated').textContent =
    'DM lore · updated '+DATA.updated+' · not for players.';
  const dl=document.createElement('datalist'); dl.id='itemdl';
  dl.innerHTML = DATA.items.map(i=>'<option value="'+esc(i.name)+'">').join('');
  document.body.appendChild(dl);
  let start='ml';
  if(location.hash){
    const h=location.hash.slice(1);
    if(h.startsWith('tp-')) start='tp'; else if(h.startsWith('pe-')) start='pe';
    else if(h.startsWith('pl-')) start='pl'; else if(h.startsWith('itc-')) start='it';
  }
  showTab(start, false);
  liveRefresh().then(ok=>{ if(ok && (curTab==='pl'||curTab==='it')) showTab(curTab, false); updateGear(); });
  if(location.hash){ setTimeout(()=>{const el=document.querySelector(location.hash); if(el) el.scrollIntoView();}, 80); }
  window.addEventListener('scroll', onScroll, {passive:true});
}

/* ---------------- live API ---------------- */
function apiCfg(){ try{return JSON.parse(localStorage.getItem('tideapi')||'null');}catch(e){return null;} }
async function api(path, body){
  const c=apiCfg(); if(!c) throw new Error('API not configured');
  const r=await fetch(c.url.replace(/\/+$/,'')+path, {
    method: body?'POST':'GET',
    headers: {'Authorization':'Bearer '+c.token, 'Content-Type':'application/json'},
    body: body?JSON.stringify(body):undefined,
  });
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}
async function liveRefresh(){
  if(!apiCfg()){ liveOK=false; return false; }
  try{
    const j=await api('/api/state');
    DATA.players=j.players; DATA.items=j.items;
    const dl=document.getElementById('itemdl');
    if(dl) dl.innerHTML = DATA.items.map(i=>'<option value="'+esc(i.name)+'">').join('');
    liveOK=true;
  }catch(e){ liveOK=false; }
  updateGear();
  return liveOK;
}
function updateGear(){
  const g=document.getElementById('gear');
  g.classList.toggle('live', liveOK);
  g.title = liveOK ? 'Live editing ON — connected to the bot' : 'Configure bot API for live editing';
}
function configApi(){
  const c=apiCfg()||{url:'',token:''};
  const url=prompt('Bot API base URL (empty to disconnect):', c.url);
  if(url===null) return;
  if(!url.trim()){ localStorage.removeItem('tideapi'); liveOK=false; updateGear(); rerender(); return; }
  const token=prompt('API token:', c.token);
  if(token===null) return;
  localStorage.setItem('tideapi', JSON.stringify({url:url.trim(), token:token.trim()}));
  liveRefresh().then(ok=>{
    alert(ok ? 'Connected — live editing is ON.' : 'Could not reach the API (check URL / token / that the bot is up). Showing the build-time snapshot.');
    rerender();
  });
}
function rerender(){ if(curTab==='pl') renderPlayers(); else if(curTab==='it') renderItems(); }

/* ---------------- tabs ---------------- */
function bookOf(id){ if(id.startsWith('tp-'))return 'tp'; if(id.startsWith('pe-'))return 'pe'; return 'ml'; }

function showTab(key, resetScroll){
  curTab = key;
  document.querySelectorAll('.bookbtn').forEach(b=>b.classList.toggle('on', b.dataset.book===key));
  document.getElementById('results').style.display='none';
  document.querySelector('.wrap').style.display='grid';
  const toc = document.getElementById('toc');
  if(key==='pl'){
    renderPlayers();
    toc.innerHTML = DATA.players.map(p=>'<a href="#pl-'+p.id+'">'+esc(p.name)+'</a>').join('');
  } else if(key==='it'){
    renderItems();
    const cats=[...new Set(DATA.items.map(i=>i.category||'Uncategorized'))];
    toc.innerHTML = cats.map(c=>'<a href="#itc-'+jslug(c)+'">'+esc(c)+'</a>').join('');
  } else {
    const book = DATA.books.find(b=>b.key===key);
    document.getElementById('content').innerHTML = book.html;
    toc.innerHTML = book.toc.map(e=>'<a class="l'+e.level+'" href="#'+e.id+'">'+esc(e.text)+'</a>').join('');
    document.getElementById('content').querySelectorAll('a.xref').forEach(a=>{
      a.addEventListener('click', ev=>{
        const id = a.getAttribute('href').slice(1);
        if(bookOf(id)!==curTab){
          ev.preventDefault();
          showTab(bookOf(id));
          setTimeout(()=>{const el=document.getElementById(id); if(el){el.scrollIntoView(); history.replaceState(null,'','#'+id);}}, 50);
        }
      });
    });
  }
  if(resetScroll!==false) window.scrollTo(0,0);
}

/* ---------------- players dashboard ---------------- */
function liveBanner(){
  return '<div class="updated">'+(liveOK
    ? '🟢 Live — edits apply instantly through the bot and are saved to the game.'
    : '⚪ Snapshot from '+DATA.updated+'. Configure the bot API (⚙ top right) for live editing.')+'</div>';
}
function renderPlayers(){
  const live = liveOK;
  let h = '<h1>Players</h1>'+liveBanner();
  h += DATA.players.map(p=>{
    const rows = p.inventory.map(it=>
      '<tr><td>'+esc(it.name)+'</td><td class="qty">'+
      (live?'<button class="qbtn" data-act="dec" data-id="'+p.id+'" data-item="'+esc(it.name)+'">−</button> ':'')+
      '<b>'+it.qty+'</b>'+
      (live?' <button class="qbtn" data-act="inc" data-id="'+p.id+'" data-item="'+esc(it.name)+'">+</button>':'')+
      '</td><td class="dim">'+esc(it.desc)+'</td>'+
      (live?'<td><button class="qbtn del" data-act="del" data-id="'+p.id+'" data-item="'+esc(it.name)+'" title="Remove all">✕</button></td>':'')+
      '</tr>').join('');
    const inv = p.inventory.length
      ? '<div class="tscroll"><table><thead><tr><th>Item</th><th>Qty</th><th>Effect</th>'+(live?'<th></th>':'')+'</tr></thead><tbody>'+rows+'</tbody></table></div>'
      : '<p class="dim">No items.</p>';
    const add = live
      ? '<div class="addrow"><input class="additem" list="itemdl" placeholder="Add item (type to search catalog)…">'+
        '<input class="addqty" type="number" value="1" min="1">'+
        '<button data-act="add" data-id="'+p.id+'">Add</button></div>'
      : '';
    const meta = [
      p.label!=='Player' ? '<b>'+esc(p.label)+'</b>' : '',
      p.team ? esc(p.team) : '',
      p.pronouns ? esc(p.pronouns) : '',
      p.affiliation ? 'Affiliation: '+esc(p.affiliation) : '',
      '💰 '+money(p.wallet),
      p.titles.length ? '🏷 '+p.titles.map(esc).join(' · ') : '',
    ].filter(Boolean).join(' &nbsp;·&nbsp; ');
    return '<div class="pcard" id="pl-'+p.id+'"><h2>'+esc(p.name)+'</h2><div class="pmeta">'+meta+'</div>'+inv+add+'</div>';
  }).join('');
  document.getElementById('content').innerHTML = h;
}

/* ---------------- items catalog ---------------- */
function effSummary(e){
  if(!e) return '<span class="dim">narrative</span>';
  let s = e.kind;
  if(e.kind==='damage') s = 'dmg '+e.amount+(e.max?'–'+e.max:'');
  if(e.kind==='heal') s = 'heal '+e.amount;
  if(e.kind==='status') s = 'status: '+esc(e.status||'');
  if(e.dot) s += ' · '+e.dot+'/tick';
  if(e.mute) s += ' · mute '+(e.mute==='line'?'line':e.mute==='turn'?'1 turn':e.mute+'s');
  return '<span class="effsum">'+s+'</span>';
}
function renderItems(){
  const live = liveOK;
  let h = '<h1>Item Catalog</h1>'+liveBanner();
  h += '<p class="dim">'+DATA.items.length+' defined items. '+(live?'Click ✎ to edit an item\'s description or cost.':'')+'</p>';
  if(live) h += '<div class="newdef"><button class="qbtn" data-act="newdef" style="width:auto;padding:4px 14px">＋ define new item</button></div>';
  const cats = [...new Set(DATA.items.map(i=>i.category||'Uncategorized'))];
  for(const cat of cats){
    const rows = DATA.items.filter(i=>(i.category||'Uncategorized')===cat).map(i=>
      '<tr><td>'+esc(i.name)+(live?' <button class="qbtn" data-act="editdef" data-key="'+esc(i.key)+'" title="Edit">✎</button>':'')+'</td>'+
      '<td>'+effSummary(i.effect)+'</td>'+
      '<td>'+(i.cost?money(i.cost):'<span class="dim">—</span>')+'</td>'+
      '<td class="dim">'+esc(i.desc)+'</td></tr>').join('');
    h += '<h2 id="itc-'+jslug(cat)+'">'+esc(cat)+'</h2>'+
      '<div class="tscroll"><table><thead><tr><th>Item</th><th>Effect</th><th>Cost</th><th>Description</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  document.getElementById('content').innerHTML = h;
}

/* ---------------- edit actions ---------------- */
async function onContentClick(ev){
  const b = ev.target.closest('button[data-act]');
  if(!b) return;
  const act = b.dataset.act;
  try{
    if(act==='inc' || act==='dec'){
      await api('/api/inventory', {user_id:b.dataset.id, item:b.dataset.item, delta: act==='inc'?1:-1});
    } else if(act==='del'){
      if(!confirm('Remove ALL copies of "'+b.dataset.item+'" from this player?')) return;
      await api('/api/inventory', {user_id:b.dataset.id, item:b.dataset.item, set:0});
    } else if(act==='add'){
      const row=b.closest('.addrow');
      const name=row.querySelector('.additem').value.trim();
      const qty=parseInt(row.querySelector('.addqty').value,10)||1;
      if(!name) return;
      await api('/api/inventory', {user_id:b.dataset.id, item:name, delta:qty});
    } else if(act==='newdef'){
      const name=prompt('Item name?'); if(!name||!name.trim()) return;
      const category=prompt('Category?','Utility Ability')||'';
      const costs=prompt('Cost (blank for none)?','')||'';
      const desc=prompt('Description?','')||'';
      await api('/api/item-def', {name:name.trim(), category:category.trim(), cost: costs?parseInt(costs,10):null, desc:desc.trim()});
    } else if(act==='editdef'){
      const it=DATA.items.find(x=>x.key===b.dataset.key); if(!it) return;
      const desc=prompt('Description:', it.desc); if(desc===null) return;
      const costs=prompt('Cost (blank for none):', it.cost||''); if(costs===null) return;
      const category=prompt('Category:', it.category||''); if(category===null) return;
      await api('/api/item-def', {name:it.name, category:category.trim(), cost: costs?parseInt(costs,10):null, desc:desc});
    } else { return; }
    await liveRefresh();
    rerender();
  }catch(e){
    alert('Edit failed: '+e.message+' — is the bot API reachable?');
    await liveRefresh(); rerender();
  }
}

function onScroll(){
  document.getElementById('topbtn').style.display = window.scrollY>600 ? 'block' : 'none';
  const hs = document.querySelectorAll('#content h2[id], #content h3[id]');
  let cur=null;
  for(const h of hs){ if(h.getBoundingClientRect().top < 90) cur=h; else break; }
  document.querySelectorAll('#toc a').forEach(a=>a.classList.toggle('cur', cur && a.getAttribute('href')==='#'+cur.id));
}

function doSearch(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const res = document.getElementById('results');
  const wrap = document.querySelector('.wrap');
  if(q.length<3){ res.style.display='none'; wrap.style.display='grid'; return; }
  const hits=[];
  const M1='\u0001', M2='\u0002';
  for(const book of DATA.books){
    const div=document.createElement('div'); div.innerHTML=book.html;
    let section='(intro)', sid=null;
    for(const node of div.children){
      if(/^H[23]$/.test(node.tagName)){ section=node.textContent; sid=node.id; continue; }
      const txt=node.textContent||'';
      const idx=txt.toLowerCase().indexOf(q);
      if(idx>=0 && hits.length<60){
        const s=Math.max(0,idx-70), e=Math.min(txt.length, idx+q.length+90);
        const snip=(s>0?'…':'')+txt.slice(s,idx)+M1+txt.slice(idx,idx+q.length)+M2+txt.slice(idx+q.length,e)+(e<txt.length?'…':'');
        hits.push({book:book.title, key:book.key, section, sid, snip});
      }
    }
  }
  for(const it of DATA.items){
    if(hits.length>=60) break;
    const txt=(it.name+' '+(it.desc||'')).toLowerCase();
    if(txt.indexOf(q)>=0) hits.push({book:'Item Catalog', key:'it', section:it.category||'', sid:'itc-'+jslug(it.category||'Uncategorized'), snip:it.name+' — '+(it.desc||'')});
  }
  for(const p of DATA.players){
    if(hits.length>=60) break;
    if(p.name.toLowerCase().indexOf(q)>=0) hits.push({book:'Players', key:'pl', section:p.name, sid:'pl-'+p.id, snip:p.name+' — '+p.inventory.length+' items'});
  }
  wrap.style.display='none'; res.style.display='block';
  res.innerHTML = '<p style="color:var(--dim)">'+hits.length+' match'+(hits.length===1?'':'es')+' for “'+q.replace(/</g,'&lt;')+'”</p>' +
    hits.map((h,i)=>'<div class="res" data-i="'+i+'"><div class="path">'+h.book+' → '+h.section+'</div><div class="snip">'+
      h.snip.replace(/</g,'&lt;').replace(/\u0001/g,'<mark>').replace(/\u0002/g,'</mark>')+'</div></div>').join('');
  res.querySelectorAll('.res').forEach(el=>el.addEventListener('click', ()=>{
    const h=hits[+el.dataset.i];
    document.getElementById('search').value='';
    showTab(h.key);
    if(h.sid) setTimeout(()=>{const t=document.getElementById(h.sid); if(t){t.scrollIntoView(); history.replaceState(null,'','#'+h.sid);}},50);
  }));
}

window.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('unlock').addEventListener('click', tryUnlock);
  document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  document.querySelectorAll('.bookbtn').forEach(b=>b.addEventListener('click', ()=>showTab(b.dataset.book)));
  document.getElementById('search').addEventListener('input', doSearch);
  document.getElementById('topbtn').addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.getElementById('gear').addEventListener('click', configApi);
  document.getElementById('content').addEventListener('click', onContentClick);
  const saved = sessionStorage.getItem('tidepw');
  if(saved){ document.getElementById('pw').value=saved; tryUnlock(); }
});
</script>
